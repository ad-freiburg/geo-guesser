<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geo Guesser — region map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { margin: 0; height: 100%; }
  #map { position: absolute; inset: 0; background: #eef1f4; }

  /* Name display, upper left */
  #info {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(255,255,255,0.93); padding: 8px 16px; border-radius: 6px;
    font: 600 20px/1.3 system-ui, -apple-system, sans-serif; color: #1a1a1a;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3); max-width: 60vw;
    pointer-events: none;
  }
  #info .hint { font-weight: 400; font-size: 15px; color: #888; }

  /* Dataset picker, upper right */
  #picker {
    position: absolute; top: 12px; right: 12px; z-index: 1000;
    background: rgba(255,255,255,0.93); padding: 6px 9px; border-radius: 6px;
    font: 14px system-ui, sans-serif; box-shadow: 0 1px 5px rgba(0,0,0,0.3);
    border: none;
  }
</style>
</head>
<body>
  <div id="map"></div>
  <div id="info"><span class="hint">Click a region to see its name</span></div>
  <select id="picker"></select>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
